name: check-infra

on:
  workflow_call:

permissions:
  contents: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules-changed: ${{ steps.build-matrix.outputs.modules-changed }}
      stacks-changed: ${{ steps.build-matrix.outputs.stacks-changed }}
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Detect changes
        uses: ./.github/actions/tg-matrix
        id: build-matrix
        with:
          modules-dirs: |
            - infra/modules
            - infra/units
          stacks-dir: infra/stacks

  lint:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.modules-changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Install Terraform/Terragrunt
        uses: ./.github/actions/tg-install
        with:
          terragrunt-version: ${{ vars.TERRAGRUNT_VERSION }}
          terraform-version: ${{ vars.TERRAFORM_VERSION }}
      -
        name: Lint Terraform & Terragrunt code
        uses: ./.github/actions/tg-lint
        with:
          gh-app-client-id: ${{ secrets.WRITER_APP_CLIENT_ID }}
          gh-app-private-key: ${{ secrets.WRITER_APP_PRIVATE_KEY }}
          tf-modules-dir: infra/modules
          tg-units-dir: infra/units
          tg-stacks-dir: infra/stacks

  plan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.stacks-changed != '[]' }}
    uses: ./.github/workflows/terragrunt-plan.yml
    with:
      TERRAGRUNT_VERSION: ${{ vars.TERRAGRUNT_VERSION }}
      TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
      STACKS_DIR: infra/stacks
      STACKS: ${{ needs.detect-changes.outputs.stacks-changed }}
