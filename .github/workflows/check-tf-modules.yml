name: check-tf-modules

on:
  workflow_call:
    inputs:
      TERRAGRUNT_VERSION:
        required: true
        type: string
      TERRAFORM_VERSION:
        required: true
        type: string
      WORKING_DIR:
        required: true
        type: string
        description: The working directory
      MODULES_DIR:
        required: true
        type: string
        description: The directory to search within for Terraform modules
    secrets:
      GH_APP_CLIENT_ID:
        description: If specified, git commands will be performed by this app, instead of the caller
        required: false
      GH_APP_PRIVATE_KEY:
        description: If specified, git commands will be performed by this app, instead of the caller
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:

  check-tf-modules:
    runs-on: ubuntu-latest
    steps:
      -
        name: Check if app credentials set
        id: check-app-secrets
        env:
          GH_APP_CLIENT_ID: ${{ secrets.GH_APP_CLIENT_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "$GH_APP_CLIENT_ID" ]]; then
            echo "No GH_APP_CLIENT_ID provided"
            echo "set=false" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$GH_APP_PRIVATE_KEY" ]]; then
            echo "No GH_APP_PRIVATE_KEY provided"
            echo "set=false" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "set=true" | tee -a "$GITHUB_OUTPUT"
      -
        name: Fetch app token
        id: fetch-app-token
        if: steps.check-app-secrets.outputs.set == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      -
        uses: actions/checkout@v6
        with:
          token: ${{ steps.fetch-app-token.outputs.token || github.token }}
      -
        name: Install Terraform & Terragrunt
        uses: ./.github/actions/tg-install
        with:
          TERRAFORM_VERSION: ${{ inputs.TERRAFORM_VERSION }}
          TERRAGRUNT_VERSION: ${{ inputs.TERRAGRUNT_VERSION }}
      -
        name: Format Terraform files
        working-directory: ${{ inputs.WORKING_DIR }}
        run: |
          terraform fmt -recursive
      -
        name: Validate Terragrunt files
        working-directory: ${{ inputs.WORKING_DIR }}
        run: |
          terragrunt hcl validate --inputs --strict
      -
        name: Format Terragrunt files
        working-directory: ${{ inputs.WORKING_DIR }}
        run: |
          terragrunt hcl fmt
      -
        name: List all directories with *.tf files
        id: module-paths
        env:
          MODULES_DIR: ${{ inputs.MODULES_DIR }}
        run: |
          MODULE_DIRS_JSON=$(find "$MODULES_DIR" -type f -name '*.tf' \
            | xargs -n1 dirname \
            | sort -u \
            | jq -Rsrc 'split("\n") | map(select(. != ""))')

          echo "paths-json=$MODULE_DIRS_JSON" | tee -a "$GITHUB_OUTPUT"
      -
        name: Ensure all modules have README.md files
        uses: actions/github-script@v7
        env:
          MODULE_PATHS_JSON: ${{ steps.module-paths.outputs.paths-json }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const modulePaths = JSON.parse(process.env.MODULE_PATHS_JSON);
            const tfdocsMarker = '<!-- BEGIN_TF_DOCS -->\n<!-- END_TF_DOCS -->';

            for (const modulePath of modulePaths) {
              const readmePath = path.join(modulePath, 'README.md');

              if (!fs.existsSync(readmePath)) {
                const basename = path.basename(modulePath);
                const content = `# ${basename}\n\n${tfdocsMarker}\n`;

                fs.writeFileSync(readmePath, content, 'utf8');
                console.log(`Created ${readmePath}`);
              }
            }

      -
        name: Detect changes
        id: detect-changes
        run: |
          git status -s

          if [ -n "$(git status -s)" ]; then
            echo "detected=true" | tee -a "$GITHUB_OUTPUT"
          else
            echo "detected=false" | tee -a "$GITHUB_OUTPUT"
          fi
      -
        name: Commit changes if detected
        if: ${{ steps.detect-changes.outputs.detected == 'true' }}
        uses: planetscale/ghcommit-action@v0.2.20
        env:
          GITHUB_TOKEN: ${{ steps.fetch-app-token.outputs.token || github.token }}
        with:
          commit_message: "Terraform/Terragrunt auto-generate"
          repo: ${{ github.repository }}
          branch: ${{ github.head_ref || github.ref_name }}
      -
        name: Fail if changes
        if: ${{ steps.detect-changes.outputs.detected == 'true' }}
        run: exit 1
