name: infra-pr

on:
  pull_request:
    paths:
      - 'infra/**'

permissions:
  contents: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules-changed: ${{ steps.build-matrix.outputs.modules-changed }}
      stacks-changed: ${{ steps.build-matrix.outputs.stacks-changed }}
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Detect changes
        uses: ./.github/actions/tg-matrix
        id: build-matrix
        with:
          modules-dirs: |
            - infra/modules
            - infra/units
          stacks-dir: infra/stacks

  check-modules:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.modules-changed == 'true' }}
    uses: ./.github/workflows/check-tf-modules.yml
    with:
      TERRAGRUNT_VERSION: ${{ vars.TERRAGRUNT_VERSION }}
      TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
      MODULES_DIR: infra/modules
      UNITS_DIR: infra/units
      STACKS_DIR: infra/stacks
    secrets:
      GH_APP_CLIENT_ID: ${{ secrets.WRITER_APP_CLIENT_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.WRITER_APP_PRIVATE_KEY }}

  plan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.stacks-changed != '[]' }}
    uses: ./.github/workflows/terragrunt-plan.yml
    with:
      TERRAGRUNT_VERSION: ${{ vars.TERRAGRUNT_VERSION }}
      TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
      STACKS_DIR: infra/stacks
      STACKS: ${{ needs.detect-changes.outputs.stacks-changed }}

  pr-ready:
    if: ${{ always() }}
    needs: 
      - detect-changes
      - check-modules
      - plan
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Emit PR ready check
        uses: ./.github/actions/pr-ready
        with:
          needs: ${{ toJSON(needs) }}
