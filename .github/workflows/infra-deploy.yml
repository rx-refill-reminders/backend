name: infra-deploy

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'

permissions:
  contents: read
  pull-requests: read
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules-changed: ${{ steps.build-matrix.outputs.modules-changed }}
      stacks-changed: ${{ steps.build-matrix.outputs.stacks-changed }}
    steps:
      -
        uses: actions/checkout@v6
      -
        uses: rx-refill-reminders/pipeline/.github/actions/tg-matrix@tg-matrix/v0
        id: build-matrix
        with:
          modules-dirs: |
            - infra/modules
            - infra/units
          stacks-dir: infra/stacks

  deploy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.stacks-changed != '[]' }}
    uses: rx-refill-reminders/pipeline/.github/workflows/terragrunt-apply.yml@terragrunt-apply/v0
    with:
      TERRAGRUNT_VERSION: ${{ vars.TERRAGRUNT_VERSION }}
      TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
      STACKS_DIR: infra/stacks
      STACKS: ${{ needs.detect-changes.outputs.stacks-changed }}
